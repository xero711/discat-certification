<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Discat Guard のDiscordサーバー認証ページ" />
    <meta name="theme-color" content="#071b22" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Discat Guard" />
    <meta property="og:title" content="Discat Guard Certification" />
    <meta property="og:description" content="Discordアカウントと端末情報を確認してサーバー認証を完了します。" />
    <meta name="twitter:card" content="summary" />
    <title>Discat Guard Certification</title>
    <link rel="stylesheet" href="./styles.css?v=20260511-oauth-2" />
    <script src="./app.js?v=20260511-oauth-2" defer></script>
  </head>
  <body>
    <main class="verify-shell" aria-live="polite">
      <section class="verify-card" aria-labelledby="pageTitle">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 3.2 5.2 5.7v5.2c0 4.4 2.7 8.2 6.8 9.9 4.1-1.7 6.8-5.5 6.8-9.9V5.7L12 3.2Z" />
            <path d="M9.1 12.1 11 14l4.1-4.4" />
          </svg>
        </div>
        <div class="verify-copy">
          <p class="status-label" data-status-label>認証待ち</p>
          <h1 id="pageTitle">Discat Guard 認証</h1>
          <p class="lead">Discordアカウント認証後、この端末でサーバー認証を完了します。</p>
        </div>

        <div class="verification-state" data-state-panel>
          <div class="state-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 3.2 5.2 5.7v5.2c0 4.4 2.7 8.2 6.8 9.9 4.1-1.7 6.8-5.5 6.8-9.9V5.7L12 3.2Z" />
              <path d="M9.1 12.1 11 14l4.1-4.4" />
            </svg>
          </div>
          <div>
            <h2 data-state-title>認証を開始できます</h2>
            <p data-state-message>下のボタンからDiscord OAuth2でアカウントを確認し、IPアドレスと端末情報を保護された記録として保存します。</p>
          </div>
        </div>

        <button class="verify-button" type="button" data-verify-button>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5" />
          </svg>
          <span data-button-label>Discordで認証する</span>
        </button>

        <p class="privacy-note">公開ログに生IPは表示されません。管理者はダッシュボードのIP確認から専用情報を確認できます。</p>
      </section>
    </main>
  </body>
</html>
