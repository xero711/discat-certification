<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Discat Guard のDiscordサーバー認証ページ" />
    <meta name="theme-color" content="#071b22" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Discat Guard" />
    <meta property="og:title" content="Discat Guard Certification" />
    <meta property="og:description" content="Discordアカウントと端末情報を確認してサーバー認証を完了します。" />
    <meta name="twitter:card" content="summary" />
    <title>Discat Guard Certification</title>
    <link rel="stylesheet" href="./styles.css?v=20260618-oauth-scope-1" />
    <script src="./app.js?v=20260618-oauth-scope-1" defer></script>
  </head>
  <body>
    <main class="verify-shell" aria-live="polite">
      <section class="verify-card" aria-labelledby="pageTitle">
        <div class="server-card" data-server-card>
          <img class="server-icon-image" data-server-icon-image alt="" hidden />
          <div class="server-meta">
            <span>認証先サーバー</span>
            <strong data-server-name>読み込み中</strong>
          </div>
        </div>
        <div class="verify-copy">
          <p class="status-label" data-status-label>認証待ち</p>
          <h1 id="pageTitle">Discat Guard 認証</h1>
        </div>

        <div class="verification-state" data-state-panel>
          <div class="state-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 3.2 5.2 5.7v5.2c0 4.4 2.7 8.2 6.8 9.9 4.1-1.7 6.8-5.5 6.8-9.9V5.7L12 3.2Z" />
              <path d="M9.1 12.1 11 14l4.1-4.4" />
            </svg>
          </div>
          <div>
            <h2 data-state-title>認証を開始できます</h2>
            <p data-state-message></p>
          </div>
        </div>

        <button class="verify-button" type="button" data-verify-button>
          <span class="verify-button__progress" aria-hidden="true"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6 9 17l-5-5" />
          </svg>
          <span data-button-label>2秒長押しで認証</span>
        </button>
        <p class="hold-hint">ボタンを2秒押し続けるとDiscord認証へ進みます。</p>

        <div class="return-actions" data-return-actions hidden>
          <a class="return-button return-button--app" href="#" data-return-app-link>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12h12" />
              <path d="m11 7 5 5-5 5" />
              <path d="M20 5v14" />
            </svg>
            <span>Discordアプリに戻る</span>
          </a>
          <a class="return-button return-button--web" href="#" target="_blank" rel="noopener" data-return-web-link>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 6H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4" />
              <path d="M14 4h6v6" />
              <path d="m9 15 11-11" />
            </svg>
            <span>ブラウザ版Discordを開く</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
